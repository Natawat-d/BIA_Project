# Optional PostgreSQL BI layer. The pipeline and dashboard run without it
# (they fall back to CSV), but this lets you demonstrate the star schema + views.
services:
  postgres:
    image: postgres:16
    container_name: netflix_dss_pg
    environment:
      POSTGRES_DB: netflix_dss
      POSTGRES_USER: netflix
      POSTGRES_PASSWORD: netflix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
